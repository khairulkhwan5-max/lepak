<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock It In Bestie!</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #fff9f9; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        .page { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; transition: all 0.5s ease; }
        .hidden { display: none !important; }
        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 20px; padding: 0 20px; }
        .btn-container { position: relative; width: 100%; height: 200px; }
        button { padding: 15px 30px; font-size: 1.1rem; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; transition: all 0.15s ease; }
        #yesBtn, #submitBtn, #okBtn { background-color: #d63384; color: white; }
        #yesBtn { position: absolute; left: calc(50% - 120px); top: 50px; z-index: 10; }
        #noBtn { background-color: #f8d7da; color: #721c24; position: absolute; left: calc(50% + 20px); top: 50px; touch-action: none; z-index: 10; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: left; }
        input, select { width: 100%; padding: 12px; border: 2px solid #f8d7da; border-radius: 10px; font-size: 1rem; margin-top: 5px; margin-bottom: 15px; box-sizing: border-box; }
        #submitBtn, #okBtn { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- SKRIN 1 -->
    <div id="page1" class="page">
        <h1>Najwa, I really enjoy talking to you. Would you let me take you out on a date? 🌹</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="nextPage(2)">Yes ✨</button>
            <button id="noBtn" onmouseover="lari()" ontouchstart="lari(event)">No</button>
        </div>
    </div>

    <!-- SKRIN 2 -->
    <div id="page2" class="page hidden">
        <div class="card">
            <h1 style="font-size: 1.3rem; text-align: center;">So... when are you free? Please pilih sabtu ni 🗓️</h1>
            <label>Pick a Date ✨</label>
            <input type="date" id="dateInput" value="2026-07-04" min="2026-07-04">
            
            <label>What Time? 😉</label>
            <select id="timeInput">
                <option value="7:00 PM">7:00 PM</option>
                <option value="8:00 PM">8:00 PM</option>
                <option value="9:00 PM">9:00 PM</option>
            </select>
            <button id="submitBtn" onclick="nextPage(3)">Lock It In Cutie 📌</button>
        </div>
    </div>

    <!-- SKRIN 3 -->
    <div id="page3" class="page hidden">
        <div class="card" style="background-color: #d4af37; color: white; text-align: center;">
            <h1 style="color: white;">Jangan last minit cancel tau 🥺</h1>
            <button id="okBtn" onclick="hantarWhatsApp()">[okiesss]</button>
        </div>
    </div>

    <script>
        function lari(e) {
            if (e) e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const x = Math.max(20, Math.random() * (window.innerWidth - 100));
            const y = Math.max(20, Math.random() * (window.innerHeight - 100));
            noBtn.style.left = x + 'px'; noBtn.style.top = y + 'px';
        }

        function nextPage(n) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page' + n).classList.remove('hidden');
        }

        function hantarWhatsApp() {
            const tarikh = document.getElementById('dateInput').value;
            const masa = document.getElementById('timeInput').value;
            
            // Menggunakan simbol teks selamat bagi mengelakkan pepijat rendering emoji di WhatsApp
            const ayat = "I say YES! <3\n\nTarikh: " + tarikh + "\nMasa: " + masa + "\n\nSee you there!";
            
            const encodedAyat = encodeURIComponent(ayat);
            window.location.href = `https://wa.me/601112427146?text=${encodedAyat}`;
        }
    </script>
</body>
</html>

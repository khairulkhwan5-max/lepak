<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Najwa ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .cute-gif {
            width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
        }

        h1 {
            color: #d1217e;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .btn-yes {
            background-color: #d1217e;
            color: white;
        }

        .btn-no {
            background-color: #fce8f3;
            color: #d1217e;
            position: absolute; /* Ni yang buat dia boleh gerak */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.tenor.com/w062e4jI5D0vO8P40u/milk-and-mocha.gif" alt="Cute Bear Animation" class="cute-gif">

        <h1>Najwa, I really enjoy talking to you.<br>Would you let me take you out on a date? 🌹</h1>

        <div class="btn-container">
            <!-- Bila tekan Yes, dia terus pergi WhatsApp awak -->
            <button class="btn btn-yes" onclick="window.location.href='https://wa.me/601XXXXXXXXXX'">Yes ✨</button>
            <button class="btn btn-no" id="no-btn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');

        // Fungsi butang No lari-lari
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.position = 'fixed';
        });
    </script>
</body>
</html>
